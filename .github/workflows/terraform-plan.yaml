name: Terraform Plan

on:
  workflow_dispatch:
    inputs:
      environment_file:
        description: "Env file to source (e.g., test.env)"
        required: true
        default: "test.env"
      backend_bucket:
        description: "Terraform backend S3 bucket"
        required: true
      prefix_key:
        description: "Terraform .tfstate key prefix (e.g., envs/test/banking-terraform.tfstate)"
        required: true

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_VAR_artifact_bucket: ${{ vars.ARTIFACT_BUCKET }}
  TF_VAR_aws_region: ${{ vars.AWS_REGION }}

jobs:
  terraform-plan:
    name: Run Terraform plan
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve latest build artifact keys
        run: |
          LAMBDA_KEY=$(aws s3api list-objects-v2 --bucket "${{ vars.ARTIFACT_BUCKET }}" --prefix "lambda/sha256/" --query 'sort_by(Contents,&LastModified)[-1].Key' --output text)
          GLUE_SCRIPT_KEY=$(aws s3api list-objects-v2 --bucket "${{ vars.ARTIFACT_BUCKET }}" --prefix "glue/sha256/" --query "sort_by(Contents[?ends_with(Key, 'glue_script.py')],&LastModified)[-1].Key" --output text)
          GLUE_COMMON_KEY=$(aws s3api list-objects-v2 --bucket "${{ vars.ARTIFACT_BUCKET }}" --prefix "glue/sha256/" --query "sort_by(Contents[?ends_with(Key, 'glue-common.zip')],&LastModified)[-1].Key" --output text)
          echo "Resolved lambda_s3_key=$LAMBDA_KEY"
          echo "Resolved glue_script_s3_key=$GLUE_SCRIPT_KEY"
          echo "Resolved glue_common_s3_key=$GLUE_COMMON_KEY"
          echo "TF_VAR_lambda_s3_key=$LAMBDA_KEY" >> "$GITHUB_ENV"
          echo "TF_VAR_glue_script_s3_key=$GLUE_SCRIPT_KEY" >> "$GITHUB_ENV"
          echo "TF_VAR_glue_common_s3_key=$GLUE_COMMON_KEY" >> "$GITHUB_ENV"

      - name: Terraform plan
        run: |
          make plan \
            ENV_FILE="${{ inputs.environment_file }}" \
            BACKEND_BUCKET="${{ inputs.backend_bucket }}" \
            PREFIX_KEY="${{ inputs.prefix_key }}" \
            AWS_REGION="${{ env.AWS_REGION }}"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
          retention-days: 1
