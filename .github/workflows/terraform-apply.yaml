name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      environment_file:
        description: "Env file to source (e.g., test.env)"
        required: true
        default: "test.env"
      backend_bucket:
        description: "Terraform backend S3 bucket"
        required: true
      prefix_key:
        description: "Terraform .tfstate key prefix (e.g., envs/test/banking-terraform.tfstate)"
        required: true
      lambda_s3_key:
        description: "Key of lambda.zip within the artifact bucket"
        required: true
      glue_script_s3_key:
        description: "Key of glue_script.py within the artifact bucket"
        required: true
      glue_common_s3_key:
        description: "Key of glue-common.zip within the artifact bucket"
        required: true

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_VAR_artifact_bucket: ${{ vars.ARTIFACT_BUCKET }}
  TF_VAR_aws_region: ${{ vars.AWS_REGION }}
  TF_VAR_lambda_s3_key: ${{ inputs.lambda_s3_key }}
  TF_VAR_glue_script_s3_key: ${{ inputs.glue_script_s3_key }}
  TF_VAR_glue_common_s3_key: ${{ inputs.glue_common_s3_key }}

jobs:
  plan:
    name: Run Terraform plan
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform plan
        run: |
          make plan \
            ENV_FILE="${{ inputs.environment_file }}" \
            BACKEND_BUCKET="${{ inputs.backend_bucket }}" \
            PREFIX_KEY="${{ inputs.prefix_key }}" \
            AWS_REGION="${{ env.AWS_REGION }}"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
          retention-days: 1

  apply:
    name: Apply Terraform plan
    needs: plan
    runs-on: self-hosted
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Re-init backend
        run: |
          make init \
            ENV_FILE="${{ inputs.environment_file }}" \
            BACKEND_BUCKET="${{ inputs.backend_bucket }}" \
            PREFIX_KEY="${{ inputs.prefix_key }}" \
            AWS_REGION="${{ env.AWS_REGION }}"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform apply
        run: make apply
