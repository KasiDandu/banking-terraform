name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      environment_file:
        description: "Env file to source (e.g., test.env)"
        required: true
        default: "test.env"
      backend_bucket:
        description: "Terraform backend S3 bucket"
        required: true
      prefix_key:
        description: "Terraform .tfstate key prefix (e.g., envs/test/banking-terraform.tfstate)"
        required: true
      lock_table:
        description: "DynamoDB table used for Terraform state locking"
        required: false
        default: "banking-data-test-tfstate-lock"
      confirm:
        description: "Type 'destroy' to confirm you want to tear down every resource in this state"
        required: true

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  guard:
    name: Confirm destroy intent
    runs-on: self-hosted
    steps:
      - name: Check confirmation phrase
        run: |
          if [ "${{ inputs.confirm }}" != "destroy" ]; then
            echo "::error::confirm input must be exactly 'destroy' -- refusing to proceed."
            exit 1
          fi

  plan:
    name: Run Terraform destroy-plan
    needs: guard
    uses: ./.github/workflows/terraform-plan.yaml
    with:
      environment_file: ${{ inputs.environment_file }}
      backend_bucket: ${{ inputs.backend_bucket }}
      prefix_key: ${{ inputs.prefix_key }}
      lock_table: ${{ inputs.lock_table }}
      destroy: true
    secrets: inherit

  destroy:
    name: Apply destroy-plan
    needs: plan
    runs-on: self-hosted
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Re-init backend
        run: |
          make init \
            ENV_FILE="${{ inputs.environment_file }}" \
            BACKEND_BUCKET="${{ inputs.backend_bucket }}" \
            PREFIX_KEY="${{ inputs.prefix_key }}" \
            AWS_REGION="${{ env.AWS_REGION }}" \
            LOCK_TABLE="${{ inputs.lock_table }}"

      - name: Download destroy-plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform destroy (apply destroy-plan)
        run: make apply
