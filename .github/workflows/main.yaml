name: Terraform

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to target"
        required: true
        type: choice
        options: [test, prod]
        default: test
      module:
        description: "Which module to target"
        required: true
        type: choice
        options: [all, buckets, iam, banking-data]
        default: all
      action:
        description: "What to run"
        required: true
        type: choice
        options: [plan, apply, destroy]
        default: plan
      confirm_destroy:
        description: "Required for action=destroy: type the literal word 'destroy'"
        required: false

# Every module -- buckets, iam, banking-data, or all three via module=all --
# goes through the same plan -> upload artifact -> manual approval -> apply
# flow below, so there's one consistent audit trail regardless of which unit
# is targeted. deploys/Makefile's MODULE=all fans out in dependency order
# (buckets/iam before banking-data on apply, the reverse on destroy).

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  guard:
    name: Guard destroy confirmation
    runs-on: self-hosted
    steps:
      - name: Check confirmation phrase
        if: inputs.action == 'destroy'
        run: |
          if [ "${{ inputs.confirm_destroy }}" != "destroy" ]; then
            echo "::error::confirm_destroy must be exactly 'destroy' when action=destroy -- refusing to proceed."
            exit 1
          fi

  plan:
    name: Terragrunt plan
    needs: guard
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve latest build artifact keys
        if: inputs.module == 'all' || inputs.module == 'banking-data'
        run: |
          LAMBDA_KEY=$(aws s3api list-objects-v2 --bucket "${{ vars.ARTIFACT_BUCKET }}" --prefix "lambda/sha256/" --query 'sort_by(Contents,&LastModified)[-1].Key' --output text)
          GLUE_SCRIPT_KEY=$(aws s3api list-objects-v2 --bucket "${{ vars.ARTIFACT_BUCKET }}" --prefix "glue/sha256/" --query "sort_by(Contents[?ends_with(Key, 'glue_script.py')],&LastModified)[-1].Key" --output text)
          GLUE_COMMON_KEY=$(aws s3api list-objects-v2 --bucket "${{ vars.ARTIFACT_BUCKET }}" --prefix "glue/sha256/" --query "sort_by(Contents[?ends_with(Key, 'glue-common.zip')],&LastModified)[-1].Key" --output text)
          echo "Resolved lambda_s3_key=$LAMBDA_KEY"
          echo "Resolved glue_script_s3_key=$GLUE_SCRIPT_KEY"
          echo "Resolved glue_common_s3_key=$GLUE_COMMON_KEY"
          # Overwrite the committed pin file for this run only -- a -var-file
          # outranks TF_VAR_* env vars, so this is now the only place that
          # actually reaches Terraform. lambda_s3_keys/glue_script_s3_keys are
          # map(string) variables keyed by the logical name in
          # lambda.json/glue.json -- banking-artifacts only builds one of
          # each today, so each map has a single entry.
          cat > terraform/live/banking-data.tfvars <<EOF
          project_name = "banking-data"

          lambda_s3_keys = {
            event_handler = "$LAMBDA_KEY"
          }

          glue_script_s3_keys = {
            etl = "$GLUE_SCRIPT_KEY"
          }

          glue_common_s3_key = "$GLUE_COMMON_KEY"
          EOF

      - name: Terragrunt plan (or destroy-plan)
        run: |
          if [ "${{ inputs.action }}" = "destroy" ]; then
            make -C deploys destroy-plan ENV="${{ inputs.environment }}" MODULE="${{ inputs.module }}"
          else
            make -C deploys plan ENV="${{ inputs.environment }}" MODULE="${{ inputs.module }}"
          fi

      - name: Upload plan artifact(s)
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          # Matches one file (the targeted module) or three (module=all) --
          # upload-artifact preserves the path hierarchy below the common
          # ancestor of the glob matches, so this always extracts back to
          # terraform/live/<module>/tfplan on download.
          path: terraform/live/**/tfplan
          retention-days: 1

  apply:
    name: Apply plan
    needs: plan
    if: inputs.action != 'plan'
    runs-on: self-hosted
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download plan artifact(s)
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/live

      - name: Apply plan
        run: make -C deploys apply ENV="${{ inputs.environment }}" MODULE="${{ inputs.module }}"
